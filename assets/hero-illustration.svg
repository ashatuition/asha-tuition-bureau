<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 480" fill="none" role="img" aria-label="Education illustration">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c547"/>
      <stop offset="100%" style="stop-color:#c9a227"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0a1628" flood-opacity="0.12"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="280" cy="240" r="200" fill="rgba(201,162,39,0.08)"/>
  <circle cx="280" cy="240" r="160" fill="rgba(10,22,40,0.04)"/>
  <!-- Desk -->
  <rect x="120" y="320" width="320" height="12" rx="6" fill="url(#navyGrad)" opacity="0.15"/>
  <!-- Books stack -->
  <rect x="140" y="280" width="48" height="40" rx="4" fill="url(#goldGrad)" filter="url(#softShadow)"/>
  <rect x="148" y="268" width="48" height="40" rx="4" fill="#0a1628" opacity="0.8"/>
  <rect x="156" y="256" width="48" height="40" rx="4" fill="url(#goldGrad)"/>
  <!-- Laptop -->
  <rect x="320" y="290" width="100" height="60" rx="6" fill="url(#navyGrad)" filter="url(#softShadow)"/>
  <rect x="328" y="298" width="84" height="44" rx="3" fill="#f8f9fc"/>
  <rect x="360" y="350" width="20" height="8" rx="2" fill="url(#navyGrad)" opacity="0.6"/>
  <!-- Student figure -->
  <circle cx="220" cy="200" r="36" fill="#f5d6a8"/>
  <path d="M184 280 Q220 260 256 280 L256 320 L184 320 Z" fill="url(#navyGrad)"/>
  <!-- Tutor figure -->
  <circle cx="380" cy="180" r="32" fill="#e8c9a0"/>
  <path d="M348 250 Q380 235 412 250 L412 310 L348 310 Z" fill="url(#goldGrad)"/>
  <!-- Board -->
  <rect x="400" y="120" width="120" height="90" rx="8" fill="url(#navyGrad)" filter="url(#softShadow)"/>
  <rect x="412" y="132" width="96" height="66" rx="4" fill="#1a3a5c"/>
  <line x1="420" y1="150" x2="500" y2="150" stroke="#c9a227" stroke-width="3" stroke-linecap="round"/>
  <line x1="420" y1="168" x2="480" y2="168" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="420" y1="186" x2="490" y2="186" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <!-- Lightbulb idea -->
  <circle cx="100" cy="140" r="28" fill="url(#goldGrad)" opacity="0.9"/>
  <path d="M100 168 L100 185 M88 175 L112 175" stroke="#0a1628" stroke-width="3" stroke-linecap="round"/>
  <path d="M88 120 Q100 100 112 120" stroke="#0a1628" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- Stars / accents -->
  <circle cx="480" cy="80" r="6" fill="url(#goldGrad)"/>
  <circle cx="60" cy="220" r="4" fill="url(#goldGrad)" opacity="0.7"/>
  <circle cx="500" cy="300" r="5" fill="url(#goldGrad)" opacity="0.5"/>
  <!-- Location pin Varanasi hint -->
  <g transform="translate(240, 60)">
    <path d="M20 0 C8 0 0 10 0 22 C0 36 20 52 20 52 C20 52 40 36 40 22 C40 10 32 0 20 0Z" fill="url(#goldGrad)" opacity="0.9"/>
    <circle cx="20" cy="20" r="8" fill="#0a1628"/>
  </g>
</svg>
